<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Thêm nhân viên mới</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <!-- Bootstrap CSS -->
    <link rel="stylesheet"
          href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css"
          crossorigin="anonymous">
</head>
<body class="container mt-4">
<h1 class="mb-4">Thêm nhân viên mới</h1>

<form th:action="@{/employees/save}" th:object="${employee}" method="post" enctype="multipart/form-data">
    <div class="form-group">
        <label for="name">Tên:</label>
        <input type="text" th:field="*{name}" id="name" class="form-control"/>
        <div th:if="${#fields.hasErrors('name')}" th:errors="*{name}" class="text-danger"></div>
    </div>

    <div class="form-group">
        <label for="age">Tuổi:</label>
        <input type="number" th:field="*{age}" id="age" class="form-control"/>
        <div th:if="${#fields.hasErrors('age')}" th:errors="*{age}" class="text-danger"></div>
    </div>

    <div class="form-group">
        <label for="status">Status:</label>
        <input type="text" th:field="*{status}" id="status" class="form-control"/>
        <div th:if="${#fields.hasErrors('status')}" th:errors="*{status}" class="text-danger"></div>
    </div>

    <div class="form-group">
        <label for="department">Phòng ban:</label>
        <select th:field="*{departmentId}" id="department" class="form-control">
            <option th:each="dept : ${departments}" th:value="${dept.id}" th:text="${dept.name}"></option>
        </select>
        <div th:if="${#fields.hasErrors('departmentId')}" th:errors="*{departmentId}" class="text-danger"></div>
    </div>

    <div class="form-group">
        <label for="file">Avatar:</label>
        <input type="file" name="file" id="file" class="form-control-file"/>
    </div>

    <button type="submit" class="btn btn-primary">Lưu</button>
    <a th:href="@{/employees}" class="btn btn-secondary">Quay lại</a>
</form>

<script src="https://code.jquery.com/jquery-3.3.1.slim.min.js" crossorigin="anonymous"></script>
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js" crossorigin="anonymous"></script>
</body>
</html>
